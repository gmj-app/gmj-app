<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" role="img" aria-labelledby="title desc">
<title id="title">Guide My Journey logo dark mode</title>
<desc id="desc">The Guide My Journey wordmark with a connected path icon for dark backgrounds.</desc>

<defs>
  <linearGradient id="gmj-gradient" x1="18" y1="128" x2="132" y2="28" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#1D35C9"/>
    <stop offset="0.45" stop-color="#5B6FF2"/>
    <stop offset="0.72" stop-color="#7C3AED"/>
    <stop offset="1" stop-color="#9B5CF6"/>
  </linearGradient>
  <linearGradient id="gmj-gradient-soft" x1="16" y1="132" x2="138" y2="22" gradientUnits="userSpaceOnUse">
    <stop offset="0" stop-color="#1D35C9"/>
    <stop offset="0.55" stop-color="#60A5FA"/>
    <stop offset="1" stop-color="#8B5CF6"/>
  </linearGradient>
  <filter id="gmj-soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
    <feDropShadow dx="0" dy="12" stdDeviation="10" flood-color="#0F172A" flood-opacity="0.12"/>
  </filter>
</defs>
<g id="gmj-mark" fill="none" stroke-linecap="round" stroke-linejoin="round">
  <!-- outer guided path, inspired by a G-shaped journey loop -->
  <path d="M88 24 C56 25 31 51 31 83 C31 116 57 139 90 133 C112 129 128 111 130 88" stroke="url(#gmj-gradient-soft)" stroke-width="11"/>
  <!-- inner guide line -->
  <path d="M74 80 H126" stroke="url(#gmj-gradient-soft)" stroke-width="11"/>
  <!-- route nodes -->
  <circle cx="31" cy="93" r="12" fill="#2337C8"/>
  <circle cx="88" cy="24" r="12" fill="#8B5CF6"/>
  <circle cx="126" cy="80" r="12" fill="#77B6F8"/>
</g>

<g transform="translate(36 35) scale(1.0)">
  <use href="#gmj-mark"/>
</g>
<text x="232" y="132" fill="#FFFFFF" font-family="Inter, Manrope, Avenir Next, Segoe UI, Arial, sans-serif" font-size="64" font-weight="700" letter-spacing="-1.6">Guide My Journey</text>
</svg>
